name: Electron Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
            os-version: '11.0.0'
          - arch: x64
            runner: macos-13
            os-version: '10.13.0'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron app
        run: pnpm electron:build:mac
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: dist/*.dmg
          if-no-files-found: ignore

      - name: Upload blockmap
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-blockmap
          path: dist/*.blockmap
          if-no-files-found: ignore

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron app
        run: pnpm electron:build:win
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*.exe
          if-no-files-found: ignore

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron app
        run: pnpm electron:build:linux
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/*.AppImage
          if-no-files-found: ignore

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Get version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          echo "## Electron Build Release - ${{ steps.version.outputs.version }}" > release-notes.md
          echo "" >> release-notes.md
          echo "### macOS" >> release-notes.md
          echo "- **Apple Silicon (arm64)**: Optimized for M1/M2/M3/M4" >> release-notes.md
          echo "- **Intel (x64)**: macOS 10.13+" >> release-notes.md
          echo "" >> release-notes.md
          echo "### Downloads" >> release-notes.md
          echo "- **macOS**: Download \`.dmg\` files" >> release-notes.md
          echo "- **Windows**: Download \`.exe\` files" >> release-notes.md
          echo "- **Linux**: Download \`.AppImage\` files" >> release-notes.md
          echo "" >> release-notes.md
          echo "### Supported OS Versions" >> release-notes.md
          echo "- macOS 11.0+ (Apple Silicon)" >> release-notes.md
          echo "- macOS 10.13+ (Intel)" >> release-notes.md
          echo "- Windows 7+" >> release-notes.md
          echo "- Linux (AppImage compatible distributions)" >> release-notes.md

          if [[ -n "$PREV_TAG" ]]; then
            echo "" >> release-notes.md
            echo "### Changes since $PREV_TAG" >> release-notes.md
            git log --pretty=format:"- %s (%h)" --no-merges "${PREV_TAG}..HEAD" >> release-notes.md || true
          fi

          echo "path=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Flatten artifacts for release
        run: |
          mkdir -p flat-artifacts
          find release-artifacts -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.blockmap" \) -exec cp {} flat-artifacts/ \;
          ls -la flat-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          body_path: ${{ steps.changelog.outputs.path }}
          files: flat-artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
